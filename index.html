<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDB Factory Acceptance Test (FAT) Checklist</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: 'Prompt', sans-serif;
        }

        :root{
            --mea-orange:#F37021;
            --mea-orange-dark:#D95D13;
        }

        body{
            background:#f9fafb;
        }

        .mea-bg{
            background:var(--mea-orange);
        }

        .mea-text{
            color:var(--mea-orange);
        }

        .section-header{
            background:linear-gradient(135deg,var(--mea-orange),var(--mea-orange-dark));
        }

        .critical-header{
            background:linear-gradient(135deg,#ef4444,#f37021);
        }

        .radio-card{
            transition:all .2s ease;
        }

        .pass-selected{
            background:#dcfce7 !important;
            border-color:#22c55e !important;
            color:#15803d !important;
            font-weight:600;
        }

        .fail-selected{
            background:#fee2e2 !important;
            border-color:#ef4444 !important;
            color:#b91c1c !important;
            font-weight:600;
        }

        .floating-print{
            position:fixed;
            bottom:20px;
            right:20px;
            z-index:999;
        }

        @media print {

            body{
                background:white !important;
            }

            .floating-print{
                display:none !important;
            }

            .shadow-md,
            .shadow-lg{
                box-shadow:none !important;
            }

            .section-card{
                break-inside:avoid;
                page-break-inside:avoid;
            }

            input,
            textarea{
                border:none !important;
            }
        }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-7xl mx-auto p-4 md:p-8">

    <!-- Header -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden mb-6">

        <div class="mea-bg text-white p-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">

                <div>
                    <h1 class="text-2xl md:text-3xl font-bold">
                        Check list ตรวจสอบตู้ MDB ที่โรงงาน (FAT test)
                    </h1>
                    <p class="text-orange-100 mt-2">
                        Main Distribution Board (MDB) Factory Test
                    </p>
                </div>

                <div class="bg-white text-gray-700 rounded-xl w-24 h-24 flex items-center justify-center">
                    <div class="text-center">
                        <i class="fa-solid fa-bolt text-3xl mea-text"></i>
                        <p class="text-xs mt-1 font-semibold">MEA LOGO</p>
                    </div>
                </div>

            </div>
        </div>

        <div class="p-6">
            <div class="grid md:grid-cols-3 gap-4">

                <div>
                    <label class="text-sm text-gray-500">Reference Spec</label>
                    <input type="text"
                           value="BQD-3042"
                           class="w-full mt-1 border rounded-lg px-3 py-2 bg-gray-50">
                </div>

                <div>
                    <label class="text-sm text-gray-500">Revision Date</label>
                    <input type="date"
                           class="w-full mt-1 border rounded-lg px-3 py-2">
                </div>

                <div>
                    <label class="text-sm text-gray-500">Project / MDB No.</label>
                    <input type="text"
                           placeholder="Enter MDB Information"
                           class="w-full mt-1 border rounded-lg px-3 py-2">
                </div>

            </div>
        </div>

    </div>

    <!-- Checklist Container -->
    <div id="checklistContainer"></div>

    <!-- Inspector Section -->
    <div class="bg-white rounded-2xl shadow-lg p-6 mt-8">

        <h2 class="text-xl font-bold mb-4 mea-text">
            <i class="fa-solid fa-user-check mr-2"></i>
            สรุปการตรวจสอบ
        </h2>

        <div class="grid md:grid-cols-2 gap-4">

            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    ผู้ตรวจสอบ (Inspector Name)
                </label>
                <input type="text"
                       class="w-full border rounded-lg px-3 py-2"
                       placeholder="ชื่อผู้ตรวจสอบ">
            </div>

            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    วันที่ (Date)
                </label>
                <input type="date"
                       class="w-full border rounded-lg px-3 py-2">
            </div>

        </div>

    </div>

</div>

<!-- Floating Print Button -->
<button id="printBtn"
        onclick="printChecklist()"
        class="floating-print mea-bg hover:opacity-90 text-white px-6 py-4 rounded-full shadow-lg font-semibold text-lg">

    <i class="fa-solid fa-print mr-2"></i>
    Print / Save as PDF

</button>

<script>

const sections = [
{
title:"Section 1 : การตรวจสอบโครงสร้างและตู้ (Enclosure & Structure)",
critical:false,
items:[
["1.1","ตรวจสอบขนาดตู้และรูปแบบตรงตามแบบ","IEC 61439"],
["1.2","ตรวจสอบระดับการป้องกัน IP","IEC 60529"],
["1.3","ตรวจสอบการพ่นสีและความแข็งแรงของโครงสร้าง","Manufacturer Standard"]
]
},
{
title:"Section 2 : บัสบาร์และตัวนำ (Busbar & Conductors)",
critical:false,
items:[
["2.1","ตรวจสอบขนาดบัสบาร์และวัสดุ","IEC 61439"],
["2.2","ตรวจสอบระยะห่างเฟสต่อเฟส","IEC 61439"],
["2.3","ตรวจสอบการหุ้มฉนวนบัสบาร์","IEC 60664"]
]
},
{
title:"Section 3 : เซอร์กิตเบรกเกอร์ (Circuit Breaker)",
critical:false,
items:[
["3.1","ตรวจสอบรุ่นและพิกัดกระแส MCCB/ACB","IEC 60947"],
["3.2","ตรวจสอบการติดตั้งและแรงบิดขันแน่น","Manufacturer Standard"],
["3.3","ตรวจสอบการตั้งค่า Protection","IEC 60947-2"]
]
},
{
title:"Section 4 : สายไฟและการเดินสาย (Cable & Wiring)",
critical:false,
items:[
["4.1","ตรวจสอบขนาดสายไฟ","IEC 60364"],
["4.2","ตรวจสอบหมายเลขสายและ Tag","Project Specification"],
["4.3","ตรวจสอบการจัดเก็บสายภายในตู้","Best Practice"]
]
},
{
title:"Section 5 : อุปกรณ์เครื่องวัด (Current Transformer, Lamp, Digital Meter)",
critical:false,
items:[
["5.1","ตรวจสอบอัตราทด CT","IEC 61869"],
["5.2","ตรวจสอบหลอดไฟแสดงสถานะ","Project Specification"],
["5.3","ตรวจสอบการอ่านค่าของ Digital Meter","IEC 62053"]
]
},
{
title:"Section 6 : ทดสอบการทำงาน (Function Test)",
critical:false,
items:[
["6.1","ทดสอบปุ่ม ON/OFF","FAT Procedure"],
["6.2","ทดสอบวงจร Interlock","FAT Procedure"],
["6.3","ทดสอบ Alarm และ Indicator","FAT Procedure"]
]
},
{
title:"Section 7 : การทดสอบไฟฟ้า (Electrical Testing)",
critical:true,
items:[
["7.1","Insulation Resistance Test","IEC 61439"],
["7.2","Continuity Test","IEC 61557"],
["7.3","Dielectric Withstand Test","IEC 61439"]
]
}
];

const container = document.getElementById("checklistContainer");

sections.forEach((section, sIndex)=>{

let html = `
<div class="section-card bg-white rounded-2xl shadow-md overflow-hidden mb-6">

    <div class="${section.critical ? 'critical-header' : 'section-header'} text-white p-4">

        <div class="flex items-center justify-between">

            <h2 class="font-bold text-lg md:text-xl">
                ${section.title}
            </h2>

            ${
                section.critical
                ? '<span class="bg-white text-red-600 px-3 py-1 rounded-full text-xs font-bold">CRITICAL TEST</span>'
                : ''
            }

        </div>

    </div>

    <div class="p-4">

        <div class="hidden md:grid md:grid-cols-12 gap-3 font-semibold text-gray-700 border-b pb-3 mb-3">
            <div class="col-span-1">Item</div>
            <div class="col-span-4">Description</div>
            <div class="col-span-2">Reference</div>
            <div class="col-span-3">Result</div>
            <div class="col-span-2">Remarks</div>
        </div>
`;

section.items.forEach((item,i)=>{

const radioName = `section${sIndex}_item${i}`;

html += `
<div class="border rounded-xl p-4 mb-3 bg-gray-50">

    <div class="grid md:grid-cols-12 gap-3 items-center">

        <div class="md:col-span-1">
            <span class="font-bold">${item[0]}</span>
        </div>

        <div class="md:col-span-4">
            <div class="font-medium">${item[1]}</div>
        </div>

        <div class="md:col-span-2">
            <span class="text-sm text-gray-600">${item[2]}</span>
        </div>

        <div class="md:col-span-3">

            <div class="flex gap-2">

                <label class="radio-card pass-option border rounded-lg px-3 py-2 cursor-pointer flex-1 text-center">
                    <input type="radio"
                           name="${radioName}"
                           value="Pass"
                           class="hidden">
                    <i class="fa-solid fa-circle-check"></i>
                    ผ่าน
                </label>

                <label class="radio-card fail-option border rounded-lg px-3 py-2 cursor-pointer flex-1 text-center">
                    <input type="radio"
                           name="${radioName}"
                           value="Fail"
                           class="hidden">
                    <i class="fa-solid fa-circle-xmark"></i>
                    ไม่ผ่าน
                </label>

            </div>

        </div>

        <div class="md:col-span-2">
            <input type="text"
                   placeholder="Remarks"
                   class="w-full border rounded-lg px-2 py-2">
        </div>

    </div>

</div>
`;

});

html += `
    </div>
</div>
`;

container.innerHTML += html;

});

// Radio Button Styling
document.addEventListener("change",(e)=>{

    if(e.target.type === "radio"){

        const group = document.querySelectorAll(`input[name="${e.target.name}"]`);

        group.forEach(radio=>{

            const label = radio.closest("label");

            label.classList.remove("pass-selected");
            label.classList.remove("fail-selected");

        });

        const selectedLabel = e.target.closest("label");

        if(e.target.value === "Pass"){
            selectedLabel.classList.add("pass-selected");
        }else{
            selectedLabel.classList.add("fail-selected");
        }
    }
});

// Print
function printChecklist(){

    const btn = document.getElementById("printBtn");

    btn.style.display = "none";

    window.print();

    setTimeout(()=>{
        btn.style.display = "block";
    },1000);
}

</script>

</body>
</html>
