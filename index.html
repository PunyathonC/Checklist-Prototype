<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDB Factory Acceptance Test (FAT) Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>

    <style>
        * { font-family: 'Prompt', sans-serif; box-sizing: border-box; }
        body { background: #f3f4f6; }
        .mea-bg { background: #F37021; }
        .mea-text { color: #F37021; }
        .section-header { background: linear-gradient(135deg, #F37021, #D95D13); color: white; }
        .critical-header { background: linear-gradient(135deg, #ef4444, #f37021); color: white; }
        .pass-selected { background: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; font-weight: 600; }
        .fail-selected { background: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; font-weight: 600; }
        .floating-buttons { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 99999; }
        
        @media print {
            @page { size: A4 portrait; margin: 15mm; }
            * { -webkit-print-color-adjust: exact !important; }
            body { background: white !important; }
            .no-print, .floating-buttons { display: none !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            tr { page-break-inside: avoid !important; }
            .print-page-break { page-break-before: always !important; }
            h2 { page-break-after: avoid !important; }
        }
    </style>
</head>
<body class="min-h-screen pb-10">

<table class="w-full max-w-4xl mx-auto">
    <tbody>
        <tr><td class="pb-6 pt-4 px-4">
            <div class="bg-white rounded-2xl shadow-lg border p-6">
                <h1 class="text-2xl font-bold text-gray-800">Check list ตรวจสอบตู้ MDB (FAT test)</h1>
                <div class="grid md:grid-cols-3 gap-4 mt-4">
                    <input type="text" id="referenceSpec" placeholder="Reference Spec" class="border p-2 rounded">
                    <input type="text" id="inspectorName" placeholder="ผู้ตรวจสอบ" class="border p-2 rounded">
                    <input type="text" id="projectNo" placeholder="Project / MDB No." class="border p-2 rounded">
                </div>
            </div>
        </td></tr>
    </tbody>

    <tbody id="checklistBody"></tbody>

    <tbody>
        <tr class="print-page-break">
            <td class="pt-6 px-4">
                <div class="bg-white rounded-2xl shadow-lg border p-6">
                    <h2 class="text-xl font-bold mb-4 border-b pb-3 text-orange-600">สรุปการตรวจสอบ (Summary Report)</h2>
                    <div id="summaryContent" class="p-4 bg-gray-50 rounded-xl border"></div>
                </div>
            </td>
        </tr>
    </tbody>
</table>

<div class="floating-buttons">
    <button onclick="exportToExcelJS()" class="bg-green-600 text-white px-6 py-3 rounded-full shadow-lg font-bold">Export Excel</button>
    <button onclick="window.print()" class="mea-bg text-white px-6 py-3 rounded-full shadow-lg font-bold">Print / Save PDF</button>
    <button onclick="localStorage.clear(); location.reload();" class="bg-red-500 text-white px-6 py-3 rounded-full shadow-lg font-bold">ล้างข้อมูล</button>
</div>

<script>
const sections = [
    { title:"Section 1 : การตรวจสอบโครงสร้างและตู้", icon:"fa-building", critical:false, items:[ ["1.1","ขนาดตู้","ตามแบบ"], ["1.2","เหล็กหนา 3 มม.","Spec 9.1"] ] },
    { title:"Section 7 : การทดสอบไฟฟ้า", icon:"fa-bolt", critical:true, items:[ ["7.1","Dielectric Test","IEC 61439-1"] ] }
];

const checklistBody = document.getElementById("checklistBody");
sections.forEach((s, sIndex) => {
    checklistBody.innerHTML += `<tr><td class="px-4 py-2"><div class="${s.critical ? 'critical-header' : 'section-header'} p-3 rounded-t-lg font-bold">${s.title}</div></td></tr>`;
    s.items.forEach((item, i) => {
        checklistBody.innerHTML += `<tr><td class="px-4 pb-2"><div class="border p-3 bg-white flex justify-between items-center rounded-b-lg"><span>${item[0]} ${item[1]}</span><input type="radio" name="s${sIndex}i${i}" value="Pass" class="ml-2"> ผ่าน <input type="radio" name="s${sIndex}i${i}" value="Fail" class="ml-2"> ไม่ผ่าน<textarea class="remarks-input border ml-4 p-1 text-sm" placeholder="หมายเหตุ"></textarea></div></td></tr>`;
    });
});

async function exportToExcelJS() {
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('FAT_Report');
    ws.addRow(['ข้อ', 'รายการ', 'ผลการตรวจสอบ', 'หมายเหตุ']);
    
    sections.forEach(s => {
        ws.addRow([s.title]);
        s.items.forEach((item, i) => {
            const rad = document.querySelector(`input[name="s${sections.indexOf(s)}i${i}"]:checked`);
            ws.addRow([item[0], item[1], rad ? rad.value : '-', document.querySelectorAll('.remarks-input')[i].value]);
        });
    });
    
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], {type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'FAT_Checklist.xlsx'; a.click();
}
</script>
</body>
</html>
